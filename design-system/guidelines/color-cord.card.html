<!-- @dsCard group="Colors" viewport="700x150" name="Cord — petrol teal" subtitle="The primary brand & the spine of every timeline" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; padding: 22px 26px; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(20,40,55,0.08); }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--ink-700); }
  .h { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--cord-800)"></div><span class="n">cord-800</span><span class="h">#0a3d50</span></div>
    <div class="sw"><div class="chip" style="background:var(--cord-700)"></div><span class="n">cord-700</span><span class="h">#0e4d63</span></div>
    <div class="sw"><div class="chip" style="background:var(--cord-600)"></div><span class="n">cord-600 ◆</span><span class="h">#155b77</span></div>
    <div class="sw"><div class="chip" style="background:var(--cord-500)"></div><span class="n">cord-500</span><span class="h">#1e6f8e</span></div>
    <div class="sw"><div class="chip" style="background:var(--cord-200)"></div><span class="n">cord-200</span><span class="h">#b4dbe7</span></div>
    <div class="sw"><div class="chip" style="background:var(--cord-100)"></div><span class="n">cord-100</span><span class="h">#e0f0f6</span></div>
    <div class="sw"><div class="chip" style="background:var(--cord-50)"></div><span class="n">cord-50</span><span class="h">#f0f8fb</span></div>
  </div>
</body>
</html>
