<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="From 4px chips to full pills" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); }
  .wrap { padding: 22px 26px; display: flex; gap: 16px; align-items: flex-end; }
  .s { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 60px; height: 52px; background: var(--cord-100); border: 1px solid var(--cord-200); }
  .n { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="s"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="n">xs·4</span></div>
    <div class="s"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="n">sm·6</span></div>
    <div class="s"><div class="box" style="border-radius:var(--radius-md)"></div><span class="n">md·8</span></div>
    <div class="s"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="n">lg·10</span></div>
    <div class="s"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="n">xl·14</span></div>
    <div class="s"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="n">2xl·20</span></div>
    <div class="s"><div class="box" style="border-radius:var(--radius-pill);width:84px"></div><span class="n">pill</span></div>
  </div>
</body>
</html>
