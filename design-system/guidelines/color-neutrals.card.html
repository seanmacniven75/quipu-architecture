<!-- @dsCard group="Colors" viewport="700x160" name="Ink & neutrals" subtitle="Cool slate ramp — text, borders, surfaces" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); }
  .wrap { padding: 20px 26px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 38px; border-radius: var(--radius-sm); border: 1px solid rgba(20,40,55,0.08); }
  .n { font-family: var(--font-mono); font-size: 9px; color: var(--ink-700); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><span class="n">ink-900</span></div>
      <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><span class="n">ink-800</span></div>
      <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><span class="n">ink-700</span></div>
      <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><span class="n">ink-600</span></div>
      <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><span class="n">ink-500</span></div>
      <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><span class="n">ink-400</span></div>
      <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><span class="n">ink-300</span></div>
    </div>
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--line-300)"></div><span class="n">line-300</span></div>
      <div class="sw"><div class="chip" style="background:var(--line-200)"></div><span class="n">line-200</span></div>
      <div class="sw"><div class="chip" style="background:var(--line-100)"></div><span class="n">line-100</span></div>
      <div class="sw"><div class="chip" style="background:var(--paper-100)"></div><span class="n">paper-100</span></div>
      <div class="sw"><div class="chip" style="background:var(--paper-50)"></div><span class="n">paper-50</span></div>
      <div class="sw"><div class="chip" style="background:var(--paper-0)"></div><span class="n">paper-0</span></div>
      <div class="sw"><div class="chip" style="background:transparent;border:1px dashed var(--line-300)"></div><span class="n">—</span></div>
    </div>
  </div>
</body>
</html>
