<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation / shadows" subtitle="Cool petrol-tinted, low and paper-like" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-sans); }
  .wrap { padding: 28px 26px; display: flex; gap: 22px; align-items: center; }
  .s { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 76px; height: 56px; background: var(--paper-0); border-radius: var(--radius-md); }
  .n { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="s"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="n">xs</span></div>
    <div class="s"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
    <div class="s"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
    <div class="s"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
    <div class="s"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="n">xl</span></div>
    <div class="s"><div class="box" style="box-shadow:var(--ring-cord)"></div><span class="n">ring-cord</span></div>
  </div>
</body>
</html>
