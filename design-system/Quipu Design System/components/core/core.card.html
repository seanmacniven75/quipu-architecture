<!-- @dsCard group="Components" viewport="700x300" name="Core — Buttons, Badges, Avatars" subtitle="Action controls, status pills, actor identity" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-sans); color: var(--text-body); }
  .wrap { padding: 22px 24px; display: flex; flex-direction: column; gap: 18px; }
  .group { display: flex; flex-direction: column; gap: 9px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .04em; text-transform: uppercase; color: var(--text-faint); }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .lucide { width: 16px; height: 16px; }
</style>
</head>
<body>
  <div id="root" class="wrap"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>

  <script type="text/babel">
    const { Button, Badge, Avatar } = window.QuipuDesignSystem_9d1632;
    const I = (n) => <i data-lucide={n}></i>;

    function Demo() {
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
      return (
        <>
          <div className="group">
            <span className="lbl">Buttons — variants</span>
            <div className="row">
              <Button variant="primary">Save narrative</Button>
              <Button variant="secondary">Clear selection</Button>
              <Button variant="ghost">Cancel</Button>
              <Button variant="accent" icon={I('sparkles')}>Crystallise skill</Button>
              <Button variant="danger">Escalate</Button>
            </div>
          </div>
          <div className="group">
            <span className="lbl">Buttons — sizes · icon · disabled</span>
            <div className="row">
              <Button size="lg" icon={I('git-commit-horizontal')}>Large</Button>
              <Button size="md">Medium</Button>
              <Button size="sm" iconRight={I('arrow-right')}>Small</Button>
              <Button disabled>Disabled</Button>
            </div>
          </div>
          <div className="group">
            <span className="lbl">Badges</span>
            <div className="row">
              <Badge tone="success">Within SLA</Badge>
              <Badge tone="warning">SLA 1hr</Badge>
              <Badge tone="danger" variant="solid">High</Badge>
              <Badge tone="cord">Enterprise</Badge>
              <Badge tone="accent">Crystallised</Badge>
              <Badge tone="info">Tier 2</Badge>
              <Badge tone="neutral">Resolved</Badge>
            </div>
          </div>
          <div className="group">
            <span className="lbl">Avatars — by actor</span>
            <div className="row">
              <Avatar name="Maria Chen" actor="user" />
              <Avatar name="Tomás Rivera" actor="user" />
              <Avatar name="Strand Support Agent" actor="agent" />
              <Avatar name="System" actor="system" />
              <Avatar name="Priya Nair" actor="user" size={40} />
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
