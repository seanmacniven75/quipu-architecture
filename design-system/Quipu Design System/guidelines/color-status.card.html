<!-- @dsCard group="Colors" viewport="700x130" name="Semantic status" subtitle="Success, warning, danger, info" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; padding: 24px 26px; gap: 12px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .chip { width: 100%; height: 44px; border-radius: var(--radius-md); }
  .n { font-size: var(--text-xs); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--status-success)"></div><span class="n" style="color:var(--status-success)">Success</span></div>
    <div class="sw"><div class="chip" style="background:var(--status-warning)"></div><span class="n" style="color:var(--status-warning)">Warning</span></div>
    <div class="sw"><div class="chip" style="background:var(--status-danger)"></div><span class="n" style="color:var(--status-danger)">Danger</span></div>
    <div class="sw"><div class="chip" style="background:var(--status-info)"></div><span class="n" style="color:var(--status-info)">Info</span></div>
  </div>
</body>
</html>
