<!-- @dsCard group="Type" viewport="700x180" name="Display / Serif — Spectral" subtitle="Editorial voice: headings, pull quotes, the scholarly register" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); color: var(--text-heading); font-family: var(--font-sans); }
  .wrap { padding: 22px 26px; }
  .eyebrow { font: var(--type-eyebrow); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--text-faint); margin: 0 0 10px; }
  .d { font-family: var(--font-serif); color: var(--ink-900); margin: 0; letter-spacing: var(--tracking-tight); line-height: var(--leading-tight); }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .meta { font-family: var(--font-mono); font-size: var(--text-3xs); color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">Spectral · serif display</p>
    <p class="d" style="font-size: var(--text-4xl); font-weight: 600;">The case file is the quipu</p>
    <p class="d" style="font-size: var(--text-2xl); font-weight: 500; margin-top: 8px;">One continuous cord, read end to end</p>
    <p class="d" style="font-size: var(--text-lg); font-weight: 400; font-style: italic; color: var(--ink-600); margin-top: 10px;">“Pull the string straight and the full sequence returns.”</p>
    <div class="row" style="margin-top: 14px;">
      <span class="meta">600 semibold</span><span class="meta">500 medium</span><span class="meta">400 / 400 italic</span>
    </div>
  </div>
</body>
</html>
