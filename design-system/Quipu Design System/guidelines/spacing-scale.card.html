<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing scale" subtitle="4px base grid" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); }
  .wrap { padding: 22px 26px; display: flex; align-items: flex-end; gap: 14px; }
  .s { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--cord-200); border-radius: var(--radius-xs); width: 22px; }
  .n { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="s"><div class="bar" style="height:var(--space-1)"></div><span class="n">1·4</span></div>
    <div class="s"><div class="bar" style="height:var(--space-2)"></div><span class="n">2·8</span></div>
    <div class="s"><div class="bar" style="height:var(--space-3)"></div><span class="n">3·12</span></div>
    <div class="s"><div class="bar" style="height:var(--space-4)"></div><span class="n">4·16</span></div>
    <div class="s"><div class="bar" style="height:var(--space-5)"></div><span class="n">5·20</span></div>
    <div class="s"><div class="bar" style="height:var(--space-6)"></div><span class="n">6·24</span></div>
    <div class="s"><div class="bar" style="height:var(--space-8)"></div><span class="n">8·32</span></div>
    <div class="s"><div class="bar" style="height:var(--space-10)"></div><span class="n">10·40</span></div>
    <div class="s"><div class="bar" style="height:var(--space-12)"></div><span class="n">12·48</span></div>
    <div class="s"><div class="bar" style="height:var(--space-16)"></div><span class="n">16·64</span></div>
  </div>
</body>
</html>
