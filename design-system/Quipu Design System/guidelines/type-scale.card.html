<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); color: var(--ink-900); font-family: var(--font-sans); }
  .wrap { padding: 20px 26px; display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px 22px; }
  .s { display: flex; align-items: baseline; gap: 8px; }
  .s b { font-weight: 600; line-height: 1; }
  .s span { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="s"><b style="font-size:var(--text-5xl)">Aa</b><span>60</span></div>
    <div class="s"><b style="font-size:var(--text-4xl)">Aa</b><span>46</span></div>
    <div class="s"><b style="font-size:var(--text-3xl)">Aa</b><span>36</span></div>
    <div class="s"><b style="font-size:var(--text-2xl)">Aa</b><span>28</span></div>
    <div class="s"><b style="font-size:var(--text-xl)">Aa</b><span>22</span></div>
    <div class="s"><b style="font-size:var(--text-lg)">Aa</b><span>18</span></div>
    <div class="s"><b style="font-size:var(--text-md)">Aa</b><span>16</span></div>
    <div class="s"><b style="font-size:var(--text-base)">Aa</b><span>15</span></div>
    <div class="s"><b style="font-size:var(--text-sm)">Aa</b><span>14</span></div>
    <div class="s"><b style="font-size:var(--text-xs)">Aa</b><span>13</span></div>
    <div class="s"><b style="font-size:var(--text-2xs)">Aa</b><span>12</span></div>
  </div>
</body>
</html>
