<!-- @dsCard group="Colors" viewport="700x150" name="Clay — terracotta accent" subtitle="Reserved for emergent / crystallised-skill moments" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; padding: 22px 26px; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(20,40,55,0.08); }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--ink-700); }
  .h { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--clay-700)"></div><span class="n">clay-700</span><span class="h">#9c4527</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-600)"></div><span class="n">clay-600 ◆</span><span class="h">#b8542f</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-500)"></div><span class="n">clay-500</span><span class="h">#cf6a44</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-200)"></div><span class="n">clay-200</span><span class="h">#f0cdbd</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-100)"></div><span class="n">clay-100</span><span class="h">#f7e3d9</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-50)"></div><span class="n">clay-50</span><span class="h">#fcf3ee</span></div>
  </div>
</body>
</html>
