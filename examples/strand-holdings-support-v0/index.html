<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strand Support v0 (Behavior Prototype)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Strand Support v0</h1>
        <p>Behavior-only prototype for Quipu interactions.</p>
      </header>

      <section class="actions">
        <button class="action-btn" data-event-type="view.escalation_path">Trigger Escalation View</button>
        <button class="action-btn" data-event-type="agent.sla_assessment">Trigger SLA View</button>
        <button class="action-btn" data-event-type="agent.similar_incident_scan">Trigger Similar-Incidents View</button>
      </section>

      <section class="composer">
        <input id="messageInput" type="text" placeholder="Type a support message..." />
        <button id="sendMessage">Send</button>
      </section>

      <section class="views">
        <div class="section-head">
          <h2>Views (Dynamic Discovery)</h2>
          <div class="controls">
            <button id="clearFilters">Clear Selection</button>
            <button id="saveNarrative">Save Narrative</button>
          </div>
        </div>
        <div id="filters" class="chips"></div>
        <div id="narratives" class="narratives"></div>
      </section>

      <section class="timeline-section">
        <h2>Projected Timeline</h2>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
